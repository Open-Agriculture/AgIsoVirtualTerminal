name: Run custom clang-tidy checks from the AgIsoDevelopmentTools repo

on: [push, pull_request]

jobs:
  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: AgIsoDevelopmentChecks
        uses: Open-Agriculture/AgIsoDevelopmentTools@v11
        with:
          path: "."
